services:
  mcpscope:
    build:
      context: .
    image: mcpscope:local
    entrypoint:
      - /mcpscope
    command:
      - proxy
      - --server
      - /mcp-server
      - --port
      - "4444"
      - --transport
      - "${MCPSCOPE_TRANSPORT:-stdio}"
      - --db
      - /data/mcpscope.db
      - --otel
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    ports:
      - "4444:4444"
    volumes:
      - mcpscope-sqlite:/data
      - "${MCP_SERVER_PATH:?Set MCP_SERVER_PATH to a Linux MCP server binary}:/mcp-server:ro"

  jaeger:
    image: jaegertracing/all-in-one:1.59
    profiles:
      - observability
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  mcpscope-sqlite:
