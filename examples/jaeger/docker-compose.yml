services:
  jaeger:
    image: jaegertracing/all-in-one:1.59
    ports:
      - "16686:16686"
      - "4317:4317"

  mcpscope:
    image: golang:1.22
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    command: >
      sh -lc "go run . proxy --server /bin/cat --db /tmp/mcpscope.db --otel"
    depends_on:
      - jaeger
